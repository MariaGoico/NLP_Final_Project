services:
  qdrant:
    image: qdrant/qdrant
    ports: ["6333:6333"]
    volumes: ["./data/qdrant:/qdrant/storage"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: videorag
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    volumes: ["./data/minio:/data"]

  transcription:
    build: ./src/transcription
    ports: ["8001:8001"]
    volumes:
      - ./src/transcription:/app/transcription
      - whisper-cache:/root/.cache/whisper
      - ./models:/models
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: videorag
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333 
    depends_on:
      - postgres
      - minio
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build: ./src/frontend
    ports: ["8501:8501"]
    environment:
      API_URL: http://transcription:8001
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      - transcription

volumes:
  whisper-cache: